<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overlay</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <main class="overlay-shell" data-shell="overlay" data-overlay-state="idle">
      <section class="overlay-chip" data-state-chip>
        <span class="overlay-chip__label" data-state-chip-label>Waiting for meeting audio</span>
        <span class="overlay-chip__hint" data-state-chip-hint>
          Open a supported meeting tab to begin local captions.
        </span>
      </section>

      <section class="overlay-panel" aria-label="Live captions" aria-live="polite">
        <header class="overlay-head">
          <div>
            <div class="overlay-kicker">Live captions</div>
            <h1 data-overlay-title>Waiting for meeting audio</h1>
          </div>
          <span class="overlay-status" data-overlay-status>Listening</span>
        </header>

        <p class="overlay-summary" data-overlay-summary>
          Captions stay local and update as soon as a meeting is detected.
        </p>

        <div class="overlay-body" aria-live="polite">
          <p class="caption-line caption-line--primary" data-caption-primary>
            Waiting for meeting audio.
          </p>
          <p class="caption-line caption-line--secondary" data-caption-secondary>
            The overlay stays small until captions begin.
          </p>
        </div>

        <footer class="overlay-actions">
          <button class="overlay-button overlay-button--primary" type="button" data-action="toggle-pause">Start captions</button>
          <button class="overlay-button" type="button" data-action="open-transcript">
            Open transcript
          </button>
        </footer>
      </section>
    </main>

    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
